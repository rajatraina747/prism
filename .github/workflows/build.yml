name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Download yt-dlp sidecar for both architectures
      - name: Download yt-dlp (x86_64)
        run: |
          mkdir -p src-tauri/binaries
          curl -fL -o src-tauri/binaries/yt-dlp-x86_64-apple-darwin \
            "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos"
          chmod +x src-tauri/binaries/yt-dlp-x86_64-apple-darwin

      - name: Download yt-dlp (aarch64)
        run: |
          curl -fL -o src-tauri/binaries/yt-dlp-aarch64-apple-darwin \
            "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos"
          chmod +x src-tauri/binaries/yt-dlp-aarch64-apple-darwin

      # Bundle Deno so yt-dlp can solve YouTube JS challenges (required since yt-dlp 2025.11.12)
      - name: Download Deno (x86_64)
        run: |
          curl -fL -o /tmp/deno-x86.zip \
            "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-apple-darwin.zip"
          unzip -o /tmp/deno-x86.zip -d /tmp/deno-x86
          mv /tmp/deno-x86/deno src-tauri/binaries/deno-x86_64-apple-darwin
          chmod +x src-tauri/binaries/deno-x86_64-apple-darwin

      - name: Download Deno (aarch64)
        run: |
          curl -fL -o /tmp/deno-arm.zip \
            "https://github.com/denoland/deno/releases/latest/download/deno-aarch64-apple-darwin.zip"
          unzip -o /tmp/deno-arm.zip -d /tmp/deno-arm
          mv /tmp/deno-arm/deno src-tauri/binaries/deno-aarch64-apple-darwin
          chmod +x src-tauri/binaries/deno-aarch64-apple-darwin

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Optional: bakes in opt-in crash reporting; empty/missing = disabled
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # Ad-hoc sign so macOS doesn't show "damaged" error on downloaded apps
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Prism ${{ github.ref_name }}'
          releaseBody: |
            ## What's New

            - **Choose which files to download** — for multi-file torrents, a picker lets you select exactly the files you want before it starts (all selected by default)
            - **Open magnet links straight into Prism** — Prism now registers as a handler for `magnet:` links and `.torrent` files. Set it as your default in your OS's default-apps settings, then clicking a magnet on a torrent site opens Prism with the file picker
            - Fixed a race where the torrent file picker could flash open and close instantly

            Includes everything from the torrent release: magnet/.torrent downloads in the same queue, seeding controls, live peers/ratio, per-file progress, UPnP, and Quiet-Hours throttling.

            ## Install

            **macOS**: Download the `.dmg` file, open it, and drag Prism to Applications. If macOS warns about an unidentified developer, right-click the app and choose "Open".
            **Windows**: Download the `.exe` installer and run it. Windows may show a SmartScreen warning — click "More info" then "Run anyway".
            **Linux**: The AppImage is the recommended download — `chmod +x` it and run. `.deb` and `.rpm` packages are also attached.
          releaseDraft: true
          prerelease: false

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Download yt-dlp sidecar for Windows
      - name: Download yt-dlp (Windows x86_64)
        run: |
          mkdir -p src-tauri/binaries
          curl -fL -o src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe"

      # Bundle Deno so yt-dlp can solve YouTube JS challenges
      - name: Download Deno (Windows x86_64)
        run: |
          curl -fL -o deno.zip "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-pc-windows-msvc.zip"
          unzip -o deno.zip -d src-tauri/binaries/
          mv src-tauri/binaries/deno.exe src-tauri/binaries/deno-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Optional: bakes in opt-in crash reporting; empty/missing = disabled
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        with:
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Prism ${{ github.ref_name }}'
          releaseBody: |
            ## What's New

            - **Choose which files to download** — for multi-file torrents, a picker lets you select exactly the files you want before it starts (all selected by default)
            - **Open magnet links straight into Prism** — Prism now registers as a handler for `magnet:` links and `.torrent` files. Set it as your default in your OS's default-apps settings, then clicking a magnet on a torrent site opens Prism with the file picker
            - Fixed a race where the torrent file picker could flash open and close instantly

            Includes everything from the torrent release: magnet/.torrent downloads in the same queue, seeding controls, live peers/ratio, per-file progress, UPnP, and Quiet-Hours throttling.

            ## Install

            **macOS**: Download the `.dmg` file, open it, and drag Prism to Applications. If macOS warns about an unidentified developer, right-click the app and choose "Open".
            **Windows**: Download the `.exe` installer and run it. Windows may show a SmartScreen warning — click "More info" then "Run anyway".
            **Linux**: The AppImage is the recommended download — `chmod +x` it and run. `.deb` and `.rpm` packages are also attached.
          releaseDraft: true
          prerelease: false

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      # Download yt-dlp sidecar for Linux
      - name: Download yt-dlp (Linux x86_64)
        run: |
          mkdir -p src-tauri/binaries
          curl -fL -o src-tauri/binaries/yt-dlp-x86_64-unknown-linux-gnu \
            "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux"
          chmod +x src-tauri/binaries/yt-dlp-x86_64-unknown-linux-gnu

      # Bundle Deno so yt-dlp can solve YouTube JS challenges
      - name: Download Deno (Linux x86_64)
        run: |
          curl -fL -o /tmp/deno.zip \
            "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-unknown-linux-gnu.zip"
          unzip -o /tmp/deno.zip -d /tmp/deno
          mv /tmp/deno/deno src-tauri/binaries/deno-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/deno-x86_64-unknown-linux-gnu

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Optional: bakes in opt-in crash reporting; empty/missing = disabled
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        with:
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Prism ${{ github.ref_name }}'
          # Must match the other jobs: whichever job finishes last overwrites
          # the release body AND latest.json's updater notes.
          releaseBody: |
            ## What's New

            - **Choose which files to download** — for multi-file torrents, a picker lets you select exactly the files you want before it starts (all selected by default)
            - **Open magnet links straight into Prism** — Prism now registers as a handler for `magnet:` links and `.torrent` files. Set it as your default in your OS's default-apps settings, then clicking a magnet on a torrent site opens Prism with the file picker
            - Fixed a race where the torrent file picker could flash open and close instantly

            Includes everything from the torrent release: magnet/.torrent downloads in the same queue, seeding controls, live peers/ratio, per-file progress, UPnP, and Quiet-Hours throttling.

            ## Install

            **macOS**: Download the `.dmg` file, open it, and drag Prism to Applications. If macOS warns about an unidentified developer, right-click the app and choose "Open".
            **Windows**: Download the `.exe` installer and run it. Windows may show a SmartScreen warning — click "More info" then "Run anyway".
            **Linux**: The AppImage is the recommended download — `chmod +x` it and run. `.deb` and `.rpm` packages are also attached.
          releaseDraft: true
          prerelease: false
